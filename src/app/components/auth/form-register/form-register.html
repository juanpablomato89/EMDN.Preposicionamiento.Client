<div class="register-container">
  <div class="row justify-content-center align-items-center">
    <div class="mb-5 mb-md-0">
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="form-register">

        <!-- Título -->
        <div class="text-content text-center">
          <span class="title__text">Bienvenido</span>
          <span class="subtitle__text">Por favor ingresa tus datos</span>
        </div>

        <!-- Nombre y Apellidos -->
        <div class="row g-3 mb-2">
          <div class="col-md-6">
            <label class="form-label">Nombre</label>
            <input
              type="text"
              class="form-control"
              formControlName="name"
              placeholder="Nombre"
              [ngClass]="{ 'is-invalid': registerForm.get('name')?.touched && registerForm.get('name')?.invalid }"
            />
            <div *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched" class="invalid-feedback">
              Ingresa un nombre válido (mínimo 2 caracteres)
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Apellidos</label>
            <input
              type="text"
              class="form-control"
              formControlName="lastName"
              placeholder="Apellidos"
              [ngClass]="{ 'is-invalid': registerForm.get('lastName')?.touched && registerForm.get('lastName')?.invalid }"
            />
            <div *ngIf="registerForm.get('lastName')?.invalid && registerForm.get('lastName')?.touched" class="invalid-feedback">
              Por favor, introduce un apellido válido (mínimo 2 caracteres)
            </div>
          </div>
        </div>

        <!-- Correo -->
        <div class="mb-2">
          <label class="form-label">Correo</label>
          <div class="input-group">
            <input
              type="email"
              class="form-control"
              formControlName="email"
              placeholder="usuario@dcn.co.cu"
              [ngClass]="{ 'is-invalid': registerForm.get('email')?.touched && registerForm.get('email')?.invalid }"
            />
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          </div>
          <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="invalid-feedback d-block">
            Por favor, introduce una dirección de correo electrónico válida
          </div>
        </div>

        <!-- Contraseña y Confirmar -->
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">Contraseña</label>
            <div class="input-group">
              <input
                type="password"
                class="form-control"
                formControlName="password"
                placeholder="••••••••"
                [ngClass]="{ 'is-invalid': registerForm.get('password')?.touched && registerForm.get('password')?.invalid }"
              />
              <span class="input-group-text"><i class="bi bi-eye-slash"></i></span>
            </div>
            <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="invalid-feedback d-block">
              La contraseña debe tener al menos 8 caracteres
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Confirmar contraseña</label>
            <div class="input-group">
              <input
                type="password"
                class="form-control"
                formControlName="confirmPassword"
                placeholder="••••••••"
                [ngClass]="{
                  'is-invalid': registerForm.get('confirmPassword')?.touched &&
                    (registerForm.get('confirmPassword')?.invalid || registerForm.errors?.['passwordMismatch'])
                }"
              />
              <span class="input-group-text"><i class="bi bi-eye-slash"></i></span>
            </div>
            <div *ngIf="registerForm.errors?.['passwordMismatch'] && registerForm.get('confirmPassword')?.touched" class="invalid-feedback d-block">
              Las contraseñas no coinciden
            </div>
          </div>
        </div>

        <!-- Botón -->
        <div class="d-grid">
          <button
            class="btn btn-lg btn-submit"
            type="submit"
            [disabled]="isLoading || registerForm.invalid || registerForm.errors?.['passwordMismatch']"
          >
            @if (isLoading) {
              <span>registrando...</span>
            } @else {
              <span>Registrar</span>
            }
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
