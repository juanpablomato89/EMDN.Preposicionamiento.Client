    <p class="m-0 d-flex align-items-center justify-content-center" style="height: 100%;">@if (isCollapsed) {
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
        <path
          d="M10.78 19.03a.75.75 0 0 1-1.06 0l-6.25-6.25a.75.75 0 0 1 0-1.06l6.25-6.25a.749.749 0 0 1 1.275.326.749.749 0 0 1-.215.734L5.81 11.5h14.44a.75.75 0 0 1 0 1.5H5.81l4.97 4.97a.75.75 0 0 1 0 1.06Z" fill="#00ABB3"
        ></path>
      </svg>
    } @else {
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
        <path
          d="M13.22 19.03a.75.75 0 0 1 0-1.06L18.19 13H3.75a.75.75 0 0 1 0-1.5h14.44l-4.97-4.97a.749.749 0 0 1 .326-1.275.749.749 0 0 1 .734.215l6.25 6.25a.75.75 0 0 1 0 1.06l-6.25 6.25a.75.75 0 0 1-1.06 0Z" fill="#00ABB3"
        ></path>
      </svg>
    }</p>
  </button>

  <div class="main__content">
    <div class="row gy-1 mt-3">
      <div class="col-11">
        <div class="row gy-3 justify-content-between">
          <div class="col-xs-12 col-sm-12 col-lg-7">
            <span class="welcome__title">{{ title }}</span>
            <span class="welcome__subtitle">{{ subtitle }}</span>
          </div>
          <div class="col-xs-12 col-sm-12 col-lg-5">
            <app-profile [username]="this.user.name"></app-profile>
          </div>
        </div>
      </div>
      <div class="col-11" style="margin-top: 1rem">
        @if (activeItem == 'inicio') {
          <app-home></app-home>
        }
        @if (activeItem == 'productos') {
          <app-productos-list></app-productos-list>
        }
        @if (activeItem == 'configuracion') {
          <app-configuracion></app-configuracion>
        }
      </div>
    </div>
  </div>
</div>
