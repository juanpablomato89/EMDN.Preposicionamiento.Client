<div class="dialog-form">
  <h2 class="dialog-title mb-3">Restablecer contraseña</h2>
  <p class="text-muted small mb-3">Usuario: <strong>{{ data.user.email }}</strong></p>

  <form [formGroup]="form" (ngSubmit)="save()" class="d-flex flex-column gap-3">
    <div>
      <label class="form-label">Nueva contraseña *</label>
      <input type="password" class="form-control" formControlName="newPassword" />
      @if (form.get('newPassword')?.touched && form.get('newPassword')?.invalid) {
        <small class="text-danger">Mínimo 6 caracteres.</small>
      }
    </div>

    <div>
      <label class="form-label">Confirmar contraseña *</label>
      <input type="password" class="form-control" formControlName="confirm" />
      @if (form.touched && form.errors?.['mismatch']) {
        <small class="text-danger">Las contraseñas no coinciden.</small>
      }
    </div>

    <div class="d-flex justify-content-end gap-2 mt-2">
      <button type="button" class="btn btn-outline-secondary" (click)="cancel()" [disabled]="saving">
        Cancelar
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="saving">
        {{ saving ? 'Guardando...' : 'Restablecer' }}
      </button>
    </div>
  </form>
</div>
